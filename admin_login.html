<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Accès Réservé - Gérant MGP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1e293b; padding: 3rem; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); width: 100%; max-width: 420px; border-top: 5px solid #ef4444; }
        .login-box h2 { text-align: center; color: #f8fafc; margin-bottom: 2rem; font-size: 1.6rem; letter-spacing: 1px;}
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-weight: 500; font-size: 0.95rem; }
        .input-group input { width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-family: 'Inter'; outline: none; box-sizing: border-box; font-size:1rem;}
        .input-group input:focus { border-color: #ef4444; box-shadow: 0 0 5px rgba(239, 68, 68, 0.5); }
        .btn-submit { width: 100%; padding: 1rem; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 1rem;}
        .btn-submit:hover { background: #dc2626; }
        #error-msg { background: rgba(239, 68, 68, 0.1); color: #fca5a5; font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem; padding: 1rem; border-radius: 8px; border: 1px solid #7f1d1d; display: none; }
        
        .security-badge { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #475569; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🗝️ Portail Gérant MGP</h2>
    <div id="error-msg"></div>
    <form id="admin-login-form">
        <div class="input-group">
            <label>Identifiant d'Administration (Email)</label>
            <input type="email" id="admin-email" required placeholder="admin@...">
        </div>
        <div class="input-group">
            <label>Clé d'accès (Mot de passe)</label>
            <input type="password" id="admin-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-submit" id="btn-login">Vérifier l'Identité & Entrer</button>
    </form>
    
    <div class="security-badge">
        <span>🛡️ IP enregistrée. Accès strictement confidentiel.</span>
    </div>
</div>

<script>
document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('admin-email').value;
    const password = document.getElementById('admin-password').value;
    const btn = document.getElementById('btn-login');
    const errObj = document.getElementById('error-msg');
    
    btn.innerText = "Interrogation du réseau... ⏳";
    btn.disabled = true;
    errObj.style.display = 'none';

    try {
        const res = await fetch('http://localhost:3000/api/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        
        if(data.success) {
            // Sauvegarder dans le localStorage
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('connection_id', data.connection_id.toString());
            
            // Redirection vers le backoffice Gérant
            window.location.href = 'admin_dashboard.html';
        } else {
            errObj.innerText = "🚨 Erreur : " + data.message;
            errObj.style.display = 'block';
        }
    } catch(err) {
        errObj.innerText = "Serveur MGP injoignable. Le processus Node.js est-il lancé ?";
        errObj.style.display = 'block';
    } finally {
        btn.innerText = "Vérifier l'Identité & Entrer";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
